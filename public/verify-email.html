<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying — Any & All</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 420px;
      padding: 24px 28px;
      text-align: center;
    }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 14px; color: #9ca3af; margin: 0; line-height: 1.5; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verifying your email…</h1>
    <p>Redirecting you to Any &amp; All. If nothing happens, <a id="fallback" href="https://www.anynall.com/">click here</a>.</p>
  </div>
  <script>
    (function () {
      // Firebase's email action URL passes: mode, oobCode, apiKey, continueUrl, lang.
      // We forward them all to the Vercel-hosted anynall.com app, which owns the
      // React /verify-email + /reset-password overlays and runs applyActionCode()
      // client-side against a Firebase SDK that IS working.
      // This page exists only because Firebase's own __/auth/action handler is
      // currently returning API_KEY_INVALID for this project and we can't set
      // the action URL to a non-Firebase-Hosting domain.
      try {
        var params = window.location.search || "";
        var mode = new URLSearchParams(params).get("mode");
        var target = mode === "resetPassword"
          ? "https://www.anynall.com/reset-password"
          : "https://www.anynall.com/verify-email";
        var url = target + params + window.location.hash;
        // replace() so the back button doesn't return to this bounce page
        window.location.replace(url);
        var fallback = document.getElementById("fallback");
        if (fallback) fallback.setAttribute("href", url);
      } catch (e) {
        // If anything above throws, at least leave the fallback link visible
        // pointing to the home page.
      }
    })();
  </script>
</body>
</html>
