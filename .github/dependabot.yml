# Dependabot — automated dependency + security update PRs.
# Covers both npm projects in this repo: the Vite frontend (+ legacy server/)
# at the root, and the Cloud Functions backend under /functions.
#
# NOTE: version-update PRs are configured here, but Dependabot *security*
# alerts/updates must also be toggled on at the repo level:
#   GitHub → Settings → Code security → enable "Dependabot alerts" and
#   "Dependabot security updates".
version: 2
updates:
  # ── Frontend (root package.json: Vite app + legacy Express dev server) ──
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Cloud Functions backend ──
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
